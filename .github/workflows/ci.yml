name: CI - ONCE App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Lint
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm run test:unit
      env:
        # Variables necesarias para que Zod no falle durante los tests
        SPACETIMEDB_URI: "http://localhost:3000"
        SPACETIMEDB_DB_NAME: "test"
        UPSTASH_REDIS_REST_URL: "http://localhost:6379"
        UPSTASH_REDIS_REST_TOKEN: "test"
        NEXTAUTH_SECRET: "test-secret"
        NEXTAUTH_URL: "http://localhost:3000"
        NEXT_PUBLIC_SPACETIMEDB_URI: "ws://localhost:3000"
        NEXT_PUBLIC_SPACETIMEDB_DB_NAME: "test"
        NEXT_PUBLIC_URL: "http://localhost:3000"
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Build Application
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
        SPACETIMEDB_URI: "http://localhost:3000"
        SPACETIMEDB_DB_NAME: "test"
        UPSTASH_REDIS_REST_URL: "http://localhost:6379"
        UPSTASH_REDIS_REST_TOKEN: "test"
        NEXTAUTH_SECRET: "test-secret"
        NEXTAUTH_URL: "http://localhost:3000"
        NEXT_PUBLIC_SPACETIMEDB_URI: "ws://localhost:3000"
        NEXT_PUBLIC_SPACETIMEDB_DB_NAME: "test"
        NEXT_PUBLIC_URL: "http://localhost:3000"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull configuracion Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build en Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy a produccion
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
